<!DOCTYPE html>
<html lang="pt-BR">

  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>

<body class="bg-zinc-950 text-white selection:bg-amber-500 selection:text-white">
  
  <div id="root">
    <div style="color: #f59e0b; text-align: center; padding: 50px; font-family: sans-serif;">
      <h2 style="font-weight: bold; font-size: 24px; margin-bottom: 10px;">Carregando...</h2>
      <p style="color: #a1a1aa; font-size: 14px;">Conectando ao banco de dados seguro...</p>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
    import { getAuth, signInAnonymously } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js";
    import { getFirestore, collection, onSnapshot, addDoc, deleteDoc, doc, updateDoc, setDoc } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyAzCDS15N2e8hdP5wrQEzDNvZKBOAdeYjw",
      authDomain: "malaguti-brothers.firebaseapp.com",
      projectId: "malaguti-brothers",
      storageBucket: "malaguti-brothers.firebasestorage.app",
      messagingSenderId: "622848104847",
      appId: "1:622848104847:web:5874e22dab246855bb93fa"

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    signInAnonymously(auth).catch(console.error);

    window.firebaseAPI = {

  <script type="text/babel">
    const { useState, useEffect, useRef } = React;
    const WHATSAPP_NUMBER = "5511999999999"; 
    const LOGO_URL = "https://cdn-icons-png.flaticon.com/512/3014/3014491.png"; 

    // Função global de bipe sonoro (Web Audio API)
    const playBeep = () => {
      try {
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        const oscillator = audioCtx.createOscillator();
        const gainNode = audioCtx.createGain();
        
        oscillator.type = 'sine';
        oscillator.frequency.setValueAtTime(880, audioCtx.currentTime); // Frequência de bipe claro
        oscillator.frequency.exponentialRampToValueAtTime(440, audioCtx.currentTime + 0.4);
        
        gainNode.gain.setValueAtTime(0.5, audioCtx.currentTime);
        gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.4);
        
        oscillator.connect(gainNode);
        gainNode.connect(audioCtx.destination);
        
        oscillator.start();
        oscillator.stop(audioCtx.currentTime + 0.4);
      } catch (e) {
        console.log("Áudio bloqueado:", e);
      }
    };

    function App() {
      const [view, setView] = useState('menu');
      const [products, setProducts] = useState([]);
      const [orders, setOrders] = useState([]);
      const [cashRegisters, setCashRegisters] = useState([]);
      const [currentCash, setCurrentCash] = useState(null);
      
      const [deliveryFee, setDeliveryFee] = useState(5.00);
      const [pixKeyConfig, setPixKeyConfig] = useState("11999999999 (Chave Pix Exemplo)");
      const [customCategories, setCustomCategories] = useState(['Burgers', 'Porções', 'Bebidas', 'Sobremesas']);
      const [addons, setAddons] = useState([]);
      
      const [loading, setLoading] = useState(true);

      const [cart, setCart] = useState([]);
      const [isCartOpen, setIsCartOpen] = useState(false);
      const [selectedProduct, setSelectedProduct] = useState(null);
      const [selectedAddons, setSelectedAddons] = useState({});
      const [productNote, setProductNote] = useState("");
      const [paymentMethod, setPaymentMethod] = useState("Pix"); 
      
      const [customerName, setCustomerName] = useState("");
      const [customerPhone, setCustomerPhone] = useState("");
      const [street, setStreet] = useState("");
      const [number, setNumber] = useState("");
      const [neighborhood, setNeighborhood] = useState("");
      const [reference, setReference] = useState("");
      
      const [orderSuccess, setOrderSuccess] = useState(null);

      const [activeCategory, setActiveCategory] = useState("Todos");
      const [pdvTab, setPdvTab] = useState('orders');
      const [orderFilter, setOrderFilter] = useState('pendente');
      const [isAddProductModalOpen, setIsAddProductModalOpen] = useState(false);
      
      const [newProduct, setNewProduct] = useState({ name: '', price: '', category: '', description: '', imageUrl: '' });
      const [feeInput, setFeeInput] = useState("5.00");
      const [pixInput, setPixInput] = useState("11999999999");
      const [openingChangeInput, setOpeningChangeInput] = useState("0.00");
      
      const [withdrawalAmount, setWithdrawalAmount] = useState("");
      const [withdrawalReason, setWithdrawalReason] = useState("");

      const [newAddonName, setNewAddonName] = useState("");
      const [newAddonPrice, setNewAddonPrice] = useState("");

      const [leadFilter, setLeadFilter] = useState('all');
      const [promoTemplate, setPromoTemplate] = useState("Olá [Nome]! Tudo bem? Passando para avisar que hoje o cardápio da Malaguti Brothers está recheado de delícias. Que tal pedir seu lanche favorito agora? 🍔🔥");

      const [analysisStartDate, setAnalysisStartDate] = useState("");
      const [analysisEndDate, setAnalysisEndDate] = useState("");

      const viewRef = useRef(view);
      useEffect(() => { viewRef.current = view; }, [view]);

      useEffect(() => {
        const { db, collection, onSnapshot, doc } = window.firebaseAPI;
        if (!db) { setLoading(false); return; }

        const unsubProducts = onSnapshot(collection(db, 'products'), (snap) => {
          setProducts(snap.docs.map(d => ({ id: d.id, ...d.data() })));
          setLoading(false);
        }, (err) => { console.error(err); setLoading(false); });

        let isInitialOrdersLoad = true;
        const unsubOrders = onSnapshot(collection(db, 'orders'), (snap) => {
          if (!isInitialOrdersLoad && viewRef.current === 'pdv') {
            const hasNewOrder = snap.docChanges().some(change => change.type === 'added');
            if (hasNewOrder) {
              playBeep();
            }
          }
          isInitialOrdersLoad = false;

          const ords = snap.docs.map(d => ({ id: d.id, ...d.data() }));
          ords.sort((a, b) => b.createdAt - a.createdAt);
          setOrders(ords);
          setLoading(false);
        }, (err) => { console.error(err); setLoading(false); });

        const unsubCash = onSnapshot(collection(db, 'cash_registers'), (snap) => {
          const cashList = snap.docs.map(d => ({ id: d.id, ...d.data() }));
          cashList.sort((a, b) => b.openedAt - a.openedAt);
          setCashRegisters(cashList);
          const active = cashList.find(c => c.status === 'aberto');
          setCurrentCash(active || null);
        }, (err) => console.error(err));

        const unsubConfig = onSnapshot(doc(db, 'settings', 'config'), (docSnap) => {
          if (docSnap.exists()) {
            const data = docSnap.data();
            const fee = data.fee || 5.00;
            const pix = data.pixKey || "11999999999";
            setDeliveryFee(fee);
            setFeeInput(fee.toString());
            setPixKeyConfig(pix);
            setPixInput(pix);
          }
        }, (err) => console.error(err));

        const unsubCats = onSnapshot(doc(db, 'settings', 'categories'), (docSnap) => {
          if (docSnap.exists()) {
            setCustomCategories(docSnap.data().list || ['Burgers', 'Porções', 'Bebidas', 'Sobremesas']);
          }
        }, (err) => console.error(err));

        const unsubAddons = onSnapshot(collection(db, 'addons'), (snap) => {
          setAddons(snap.docs.map(d => ({ id: d.id, ...d.data() })));
        }, (err) => console.error(err));

        const timer = setTimeout(() => { setLoading(false); }, 1500);

        return () => {
          unsubProducts(); unsubOrders(); unsubCash(); unsubConfig(); unsubCats(); unsubAddons();
          clearTimeout(timer);
        };
      }, []);

      const handlePdvAccess = () => {
        const senha = prompt("Digite a senha de acesso ao sistema:");
        if (senha === "1234") {
          playBeep(); // Desbloqueia o áudio ao entrar no PDV
          setView('pdv');
        } else if (senha !== null) {
          alert("Senha incorreta! Acesso negado.");
        }
      };

      const handleOpenCash = async (e) => {
        e.preventDefault();
        const change = parseFloat(openingChangeInput);
        if (isNaN(change) || change < 0) return alert("Digite um valor de troco válido.");

        try {
          const { db, collection, addDoc } = window.firebaseAPI;
          await addDoc(collection(db, 'cash_registers'), {
            status: 'aberto',
            openingChange: change,
            openedAt: Date.now(),
            closedAt: null,
            totalSales: 0,
            pixSales: 0,
            cardSales: 0,
            cashSales: 0,
            withdrawals: []
          });
          alert("Caixa aberto com sucesso!");
        } catch (error) { alert("Erro ao abrir caixa."); }
      };

      const handleAddWithdrawal = async (e) => {
        e.preventDefault();
        if (!currentCash) return;
        const amount = parseFloat(withdrawalAmount);
        const reason = withdrawalReason.trim();

        if (isNaN(amount) || amount <= 0) return alert("Digite um valor válido para a retirada.");
        if (!reason) return alert("Digite o motivo da retirada (Ex: Gasolina, Mercado).");

        const existingWithdrawals = currentCash.withdrawals || [];
        const newWithdrawal = { id: Date.now(), amount, reason, createdAt: Date.now() };
        const updatedWithdrawals = [...existingWithdrawals, newWithdrawal];

        try {
          const { db, doc, updateDoc } = window.firebaseAPI;
          await updateDoc(doc(db, 'cash_registers', currentCash.id), {
            withdrawals: updatedWithdrawals
          });
          setWithdrawalAmount("");
          setWithdrawalReason("");
        } catch (error) {
          console.error(error);
          alert("Erro ao registrar retirada.");
        }
      };

      const handleDeleteWithdrawal = async (withdrawalId) => {
        if (!window.confirm("Deseja apagar este registro de retirada?")) return;
        const updatedWithdrawals = (currentCash.withdrawals || []).filter(w => w.id !== withdrawalId);
        try {
          const { db, doc, updateDoc } = window.firebaseAPI;
          await updateDoc(doc(db, 'cash_registers', currentCash.id), {
            withdrawals: updatedWithdrawals
          });
        } catch (error) {
          console.error(error);
        }
      };

      const handleCloseCash = async () => {
        if (!currentCash) return;
        if (!window.confirm("Deseja realmente fechar o caixa do dia?")) return;

        const sessionOrders = orders.filter(o => o.createdAt >= currentCash.openedAt);
        const totalSales = sessionOrders.reduce((acc, o) => acc + (o.total || 0), 0);
        const pixSales = sessionOrders.filter(o => o.paymentMethod === 'Pix').reduce((acc, o) => acc + (o.total || 0), 0);
        const cardSales = sessionOrders.filter(o => o.paymentMethod === 'Cartão').reduce((acc, o) => acc + (o.total || 0), 0);
        const cashSales = sessionOrders.filter(o => o.paymentMethod === 'Dinheiro').reduce((acc, o) => acc + (o.total || 0), 0);
        const totalWithdrawals = (currentCash.withdrawals || []).reduce((acc, w) => acc + w.amount, 0);

        try {
          const { db, doc, updateDoc } = window.firebaseAPI;
          await updateDoc(doc(db, 'cash_registers', currentCash.id), {
            status: 'fechado',
            closedAt: Date.now(),
            totalSales,
            pixSales,
            cardSales,
            cashSales,
            totalWithdrawals
          });
          alert("Caixa fechado com sucesso!");
        } catch (error) { alert("Erro ao fechar caixa."); }
      };

      const handleSaveConfig = async (e) => {
        e.preventDefault();
        const parsedFee = parseFloat(feeInput);
        if (isNaN(parsedFee) || parsedFee < 0) return alert("Digite um valor válido para a taxa.");
        try {
          const { db, doc, setDoc } = window.firebaseAPI;
          await setDoc(doc(db, 'settings', 'config'), { fee: parsedFee, pixKey: pixInput }, { merge: true });
          alert("Configurações atualizadas com sucesso!");
        } catch (error) { alert("Erro ao salvar configurações."); }
      };

      const handleAddAddon = async (e) => {
        e.preventDefault();
        const name = newAddonName.trim();
        const price = parseFloat(newAddonPrice);
        if (!name || isNaN(price)) return alert("Preencha o nome e um preço válido para o adicional.");
        
        try {
          const { db, collection, addDoc } = window.firebaseAPI;
          await addDoc(collection(db, 'addons'), { name, price });
          setNewAddonName("");
          setNewAddonPrice("");
        } catch (error) { alert("Erro ao adicionar adicional."); }
      };

      const handleDeleteAddon = async (id) => {
        const { db, doc, deleteDoc } = window.firebaseAPI;
        await deleteDoc(doc(db, 'addons', id));
      };

      const handleQuickAddCategory = async () => {
        const catName = prompt("Digite o nome da nova categoria:");
        if (!catName || !catName.trim()) return;
        const name = catName.trim();
        if (customCategories.includes(name)) {
            setNewProduct({...newProduct, category: name});
            return;
        }
        
        const updatedList = [...customCategories, name];
        try {
          const { db, doc, setDoc } = window.firebaseAPI;
          await setDoc(doc(db, 'settings', 'categories'), { list: updatedList }, { merge: true });
          setNewProduct({...newProduct, category: name});
        } catch (error) { alert("Erro ao criar categoria."); }
      };

      const handleDeleteCategory = async (catToDelete) => {
        if (!window.confirm(`Atenção: Tem certeza que deseja excluir a categoria "${catToDelete}"?`)) return;
        const updatedList = customCategories.filter(c => c !== catToDelete);
        try {
          const { db, doc, setDoc } = window.firebaseAPI;
          await setDoc(doc(db, 'settings', 'categories'), { list: updatedList }, { merge: true });
          if (activeCategory === catToDelete) setActiveCategory('Todos');
        } catch (error) { alert("Erro ao excluir categoria."); }
      };

      const handleTogglePause = async (product) => {
        const { db, doc, updateDoc } = window.firebaseAPI;
        await updateDoc(doc(db, 'products', product.id), { paused: !product.paused });
      };

      const handleImageUpload = (e) => {
        const file = e.target.files[0];
        if (!file) return;

        const reader = new FileReader();
        reader.onload = (uploadEvent) => {
          const img = new Image();
          img.onload = () => {
            const canvas = document.createElement('canvas');
            const MAX_WIDTH = 400;
            const MAX_HEIGHT = 400;
            let width = img.width;
            let height = img.height;

            if (width > height) {
              if (width > MAX_WIDTH) {
                height *= MAX_WIDTH / width;
                width = MAX_WIDTH;
              }
            } else {
              if (height > MAX_HEIGHT) {
                width *= MAX_HEIGHT / height;
                height = MAX_HEIGHT;
              }
            }

            canvas.width = width;
            canvas.height = height;
            const ctx = canvas.getContext('2d');
            ctx.drawImage(img, 0, 0, width, height);
            
            const dataUrl = canvas.toDataURL('image/jpeg', 0.7);
            setNewProduct(prev => ({ ...prev, imageUrl: dataUrl }));
          };
          img.src = uploadEvent.target.result;
        };
        reader.readAsDataURL(file);
      };

      const addToCartWithAddons = (product) => {
        const chosenAddons = addons.filter(a => selectedAddons[a.id]);
        const addonsTotal = chosenAddons.reduce((acc, a) => acc + a.price, 0);
        const finalPrice = parseFloat(product.price) + addonsTotal;
        
        const cartItem = {
          id: product.id + "_" + chosenAddons.map(a => a.id).join("_") + "_" + (productNote ? productNote.trim() : ""),
          productId: product.id,
          name: product.name,
          basePrice: parseFloat(product.price),
          price: finalPrice,
          addons: chosenAddons,
          note: productNote.trim(),
          quantity: 1
        };

        setCart(prev => {
          const existing = prev.find(item => item.id === cartItem.id);
          if (existing) {
            return prev.map(item => item.id === cartItem.id ? { ...item, quantity: item.quantity + 1 } : item);
          }
          return [...prev, cartItem];
        });

        setSelectedProduct(null);
        setSelectedAddons({});
        setProductNote("");
      };

      const updateQuantity = (cartItemId, delta) => {
        setCart(prev => {
          return prev.map(item => {
            if (item.id === cartItemId) {
              return { ...item, quantity: item.quantity + delta };
            }
            return item;
          }).filter(item => item.quantity > 0);
        });
      };

      const itemsTotal = cart.reduce((acc, item) => acc + (item.price * item.quantity), 0);
      const cartTotal = itemsTotal + deliveryFee;

      const handleCheckout = async () => {
        if (cart.length === 0) return;
        if (!customerName.trim()) return alert("Por favor, insira seu nome.");
        if (!customerPhone.trim()) return alert("Por favor, insira seu WhatsApp.");
        if (!street.trim()) return alert("Por favor, insira o nome da rua.");
        if (!number.trim()) return alert("Por favor, insira o número.");
        if (!neighborhood.trim()) return alert("Por favor, insira o bairro.");
        if (!paymentMethod) return alert("Por favor, selecione a forma de pagamento.");

        let addressText = `${street}, ${number} - ${neighborhood}`;
        if (reference.trim()) addressText += ` (Ref: ${reference})`;

        try {
          const { db, collection, addDoc } = window.firebaseAPI;
          await addDoc(collection(db, 'orders'), {
            customerName, customerPhone, customerAddress: addressText, 
            items: cart, subtotal: itemsTotal, deliveryFee: deliveryFee, total: cartTotal, 
            paymentMethod: paymentMethod, phone: WHATSAPP_NUMBER, status: 'pendente', source: 'whatsapp', createdAt: Date.now()
          });
          
          setOrderSuccess({
            customerName,
            paymentMethod,
            total: cartTotal
          });

          setCart([]); 
          setIsCartOpen(false); 
          setCustomerName(""); 
          setCustomerPhone(""); 
          setStreet(""); 
          setNumber(""); 
          setNeighborhood(""); 
          setReference("");
        } catch (error) { alert("Erro ao gerar pedido."); }
      };

      const handleAddProduct = async (e) => {
        e.preventDefault();
        if (!newProduct.name || !newProduct.price) return;
        const categoryToSave = newProduct.category || (customCategories.length > 0 ? customCategories[0] : 'Geral');

        try {
          const { db, collection, addDoc } = window.firebaseAPI;
          await addDoc(collection(db, 'products'), { ...newProduct, price: parseFloat(newProduct.price), category: categoryToSave, paused: false, createdAt: Date.now() });
          setNewProduct({ name: '', price: '', category: '', description: '', imageUrl: '' });
          setIsAddProductModalOpen(false);
        } catch (error) { console.error(error); }
      };

      const handleDeleteProduct = async (id) => {
        if (!window.confirm("Tem certeza que deseja excluir este produto?")) return;
        const { db, doc, deleteDoc } = window.firebaseAPI;
        await deleteDoc(doc(db, 'products', id));
      };

      const handleDeleteOrder = async (id) => {
        if (!window.confirm("Atenção! Tem certeza que deseja apagar este pedido do sistema?")) return;
        const { db, doc, deleteDoc } = window.firebaseAPI;
        await deleteDoc(doc(db, 'orders', id));
      };

      const handleUpdateOrderStatus = async (orderId, newStatus) => {
        const { db, doc, updateDoc } = window.firebaseAPI;
        await updateDoc(doc(db, 'orders', orderId), { status: newStatus });
      };

      const handleFinishAndNotify = async (order) => {
        await handleUpdateOrderStatus(order.id, 'finalizado');
        if (order.customerPhone) {
          let foneLimpo = order.customerPhone.replace(/\D/g, ''); 
          if (!foneLimpo.startsWith('55') && foneLimpo.length <= 11) foneLimpo = '55' + foneLimpo; 
          
          const mensagem = `Olá ${order.customerName}, o seu pedido ficou pronto e nos próximos instantes sairá para entrega. Obrigado pelo seu pedido e que DEUS o abençoe. 🙏🍔`;
          const zapUrl = `https://wa.me/${foneLimpo}?text=${encodeURIComponent(mensagem)}`;
          window.open(zapUrl, '_blank');
        }
      };

      const printOrder = (order) => {
        const subtotal = order.subtotal !== undefined ? order.subtotal : (order.total - (order.deliveryFee || 0));
        const fee = order.deliveryFee !== undefined ? order.deliveryFee : 0;

        let html = `
          <!DOCTYPE html>
          <html><head><title>Impressão</title>
          <style>
            body { font-family: monospace; padding: 0; margin: 0; font-size: 14px; color: black; background: white; }
            .container { padding: 10px; width: 80mm; margin: 0 auto; }
            h2 { font-size: 18px; margin: 0; text-align: center; }
            .text-center { text-align: center; }
            .border-b { border-bottom: 1px dashed black; margin-bottom: 10px; padding-bottom: 10px; }
            table { width: 100%; margin: 10px 0; border-collapse: collapse; }
            td { vertical-align: top; padding: 3px 0; }
            .text-right { text-align: right; }
            .address-box { margin-top: 15px; border-top: 2px dashed black; padding-top: 10px; }
            .address-title { font-size: 12px; font-weight: bold; margin-bottom: 2px; }
            .address-text { font-size: 16px; font-weight: bold; line-height: 1.2; }
          </style>
          </head><body>
            <div class="container">
              <div class="text-center border-b">
                <h2>MALAGUTI BROTHERS</h2>
                <p style="margin:5px 0 0 0;">Pedido #${order.id.substring(0, 5).toUpperCase()}</p>
                <p style="margin:2px 0 0 0;">${new Date(order.createdAt).toLocaleString('pt-BR')}</p>
              </div>
              <div class="border-b" style="font-size: 16px;">
                <p style="margin:3px 0;"><strong>Cliente:</strong> ${order.customerName}</p>
                ${order.customerPhone ? `<p style="margin:3px 0;"><strong>Tel:</strong> ${order.customerPhone}</p>` : ''}
                <p style="margin:3px 0;"><strong>Pagamento:</strong> <span style="font-size: 18px; font-weight: bold;">${order.paymentMethod || 'Pix'}</span></p>
              </div>
              <table>
                ${order.items.map(item => `
                  <tr>
                    <td style="width: 15%; font-size: 15px;"><strong>${item.quantity}x</strong></td>
                    <td style="font-size: 15px;">
                      ${item.name}
                      ${item.addons && item.addons.length > 0 ? `<br><span style="font-size:12px; color:#444;">+ ${item.addons.map(a => a.name).join(', ')}</span>` : ''}
                      ${item.note ? `<br><span style="font-size:13px; font-weight:bold; color:#b91c1c;">⚠️ Obs: ${item.note}</span>` : ''}
                    </td>
                    <td class="text-right" style="font-size: 15px;">R$${(item.price * item.quantity).toFixed(2)}</td>
                  </tr>
                `).join('')}
              </table>
              <div style="border-top: 1px dashed black; margin-top: 10px; padding-top: 5px; font-size: 14px;">
                <div style="display: flex; justify-content: space-between;"><span>Subtotal:</span><span>R$ ${subtotal.toFixed(2)}</span></div>
                <div style="display: flex; justify-content: space-between;"><span>Taxa Entrega:</span><span>R$ ${fee.toFixed(2)}</span></div>
              </div>
              <div class="text-right" style="margin-top: 5px; border-top: 1px dashed black; padding-top: 5px; font-size: 18px; font-weight: bold;">
                TOTAL: R$ ${order.total.toFixed(2)}
              </div>
              ${order.customerAddress ? `
                <div class="address-box">
                  <div class="address-title">ENDEREÇO DE ENTREGA:</div>

        iframe.contentWindow.document.open();

        if (analysisEndDate && orderDateStr > analysisEndDate) return false;

        periodSeasonalityStats[monthKey].revenue += (o.total || 0);
        periodSeasonalityStats[monthKey].count += 1;

        if (o.items) {

              globalProductStats[item.name] = { qty: 0, revenue: 0 };

            globalProductStats[item.name].qty += item.quantity;

                        <div>
                          <label className="block text-xs font-bold text-zinc-600 uppercase mb-1">Chave Pix (Copia e Cola)</label>
                          <textarea value={pixInput} onChange={(e) => setPixInput(e.target.value)} className="w-full bg-zinc-50 border border-zinc-300 rounded-2xl px-4 py-3 font-mono text-xs h-20" placeholder="Ex: sua chave pix ou código copia e cola" required />
                        </div>
                        <button type="submit" className="w-full bg-zinc-900 text-white font-black py-3 rounded-2xl shadow-md">Salvar Alterações</button>
                      </form>
                    </div>

                    <div className="bg-white rounded-3xl p-6 shadow-sm border border-zinc-200">
                      <h3 className="font-black text-xl mb-2">➕ Gerenciar Adicionais</h3>
                      <form onSubmit={handleAddAddon} className="space-y-3 mb-4">
                        <input type="text" value={newAddonName} onChange={(e) => setNewAddonName(e.target.value)} placeholder="Nome (Ex: Bacon Extra)" className="w-full bg-zinc-50 border border-zinc-300 rounded-2xl px-4 py-3 text-sm" required />
                        <input type="number" step="0.50" value={newAddonPrice} onChange={(e) => setNewAddonPrice(e.target.value)} placeholder="Preço (Ex: 3.00)" className="w-full bg-zinc-50 border border-zinc-300 rounded-2xl px-4 py-3 text-sm" required />
                        <button type="submit" className="w-full bg-zinc-900 text-white font-black py-3 rounded-2xl text-sm">Adicionar Adicional</button>
                      </form>

                      <div className="space-y-2">
                        {addons.map(addon => (
                          <div key={addon.id} className="flex justify-between items-center bg-zinc-50 p-3 rounded-2xl border border-zinc-200 text-sm">
                            <span className="font-bold text-zinc-800">{addon.name} (+R$ {addon.price.toFixed(2)})</span>
                            <button onClick={() => handleDeleteAddon(addon.id)} className="text-red-500 text-base px-2">🗑️</button>
                          </div>
                        ))}
                      </div>
                    </div>

                    <div className="bg-white rounded-3xl p-6 shadow-sm border border-zinc-200">
                      <h3 className="font-black text-xl mb-2">📂 Categorias</h3>
                      <div className="space-y-2 mt-2">
                        {customCategories.map(cat => (
                          <div key={cat} className="flex justify-between items-center bg-zinc-50 p-3 rounded-2xl border border-zinc-200 text-sm">
                            <span className="font-bold text-zinc-800">{cat}</span>
                            <button onClick={() => handleDeleteCategory(cat)} className="text-red-500 text-base px-2">🗑️</button>
                          </div>
                        ))}
                      </div>
                    </div>
                  </div>
                )}
              </main>

              {isAddProductModalOpen && (
                <div className="fixed inset-0 z-50 flex items-end justify-center bg-black/60">
                  <div className="bg-white w-full max-w-md rounded-t-[2rem] p-6 relative z-10 h-[85vh] flex flex-col">
                    <div className="flex justify-between items-center mb-6">
                      <h3 className="font-black text-2xl">Novo Produto</h3>
                      <button onClick={() => setIsAddProductModalOpen(false)}>✖️</button>
                    </div>
                    <form className="flex-1 overflow-y-auto space-y-4">
                      <input required type="text" value={newProduct.name} onChange={e => setNewProduct({...newProduct, name: e.target.value})} className="w-full bg-zinc-50 border border-zinc-200 rounded-2xl p-4 text-sm" placeholder="Nome do Produto" />
                      
                      <div className="flex gap-2">
                          <select value={newProduct.category} onChange={e => setNewProduct({...newProduct, category: e.target.value})} className="flex-1 bg-zinc-50 border border-zinc-200 rounded-2xl p-4 text-sm">
                            {customCategories.length === 0 && <option value="">Sem categoria</option>}
                            {customCategories.map(cat => (<option key={cat} value={cat}>{cat}</option>))}
                          </select>
                          <button type="button" onClick={handleQuickAddCategory} className="bg-amber-500 text-zinc-950 font-black px-4 rounded-2xl text-xs whitespace-nowrap">➕ Nova</button>
                      </div>

                      <input required type="number" step="0.50" value={newProduct.price} onChange={e => setNewProduct({...newProduct, price: e.target.value})} className="w-full bg-zinc-50 border border-zinc-200 rounded-2xl p-4 text-sm" placeholder="Preço (Ex: 35.00)" />
                      
                      <div className="bg-zinc-50 border border-zinc-200 rounded-2xl p-4 space-y-3">
                        <label className="block text-xs font-bold text-zinc-600 uppercase">Foto do Produto:</label>
                        <div className="flex items-center gap-4">
                          <div className="w-20 h-20 rounded-xl bg-zinc-200 flex items-center justify-center overflow-hidden shrink-0 border border-zinc-300">
                            {newProduct.imageUrl ? (
                              <img src={newProduct.imageUrl} className="w-full h-full object-cover" />
                            ) : (
                              <span className="text-2xl">🍔</span>
                            )}
                          </div>
                          <div className="flex-1">
                            <input 
                              type="file" 
                              accept="image/*" 
                              id="cameraInput" 
                              onChange={handleImageUpload} 
                              className="hidden" 
                            />
                            <label 
                              htmlFor="cameraInput" 
                              className="w-full bg-zinc-900 text-white py-3 px-4 rounded-xl text-xs font-black flex items-center justify-center gap-2 cursor-pointer shadow-sm"
                            >
                              📷 Tirar Foto / Galeria
                            </label>
                            <p className="text-[10px] text-zinc-400 mt-1.5">Escolha da galeria do celular ou abra a câmera para fotografar na hora.</p>
                          </div>
                        </div>
                      </div>

                      <textarea value={newProduct.description} onChange={e => setNewProduct({...newProduct, description: e.target.value})} className="w-full bg-zinc-50 border border-zinc-200 rounded-2xl p-4 h-24 text-sm" placeholder="Descrição / Ingredientes"></textarea>
                    </form>
                    <button onClick={handleAddProduct} className="w-full bg-zinc-900 text-white font-black py-4 rounded-2xl mt-4">Salvar Produto</button>
                  </div>
                </div>
              )}

              <nav className="fixed bottom-0 w-full max-w-md bg-white border-t border-zinc-200 z-30">
                <div className="flex justify-around p-2">
                  <button onClick={() => setPdvTab('orders')} className={`font-bold p-1 text-[11px] ${pdvTab === 'orders' ? 'text-amber-500' : 'text-zinc-400'}`}>Pedidos</button>
                  <button onClick={() => setPdvTab('products')} className={`font-bold p-1 text-[11px] ${pdvTab === 'products' ? 'text-amber-500' : 'text-zinc-400'}`}>Cardápio</button>
                  <button onClick={() => setPdvTab('clients')} className={`font-bold p-1 text-[11px] ${pdvTab === 'clients' ? 'text-amber-500' : 'text-zinc-400'}`}>Clientes</button>
                  <button onClick={() => setPdvTab('cash')} className={`font-bold p-1 text-[11px] ${pdvTab === 'cash' ? 'text-amber-500' : 'text-zinc-400'}`}>Caixa</button>
                  <button onClick={() => setPdvTab('reports')} className={`font-bold p-1 text-[11px] ${pdvTab === 'reports' ? 'text-amber-500' : 'text-zinc-400'}`}>Análise</button>
                  <button onClick={() => setPdvTab('config')} className={`font-bold p-1 text-[11px] ${pdvTab === 'config' ? 'text-amber-500' : 'text-zinc-400'}`}>Ajustes</button>
                </div>
              </nav>
            </div>
          )}
        </div>
      );
    }
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>

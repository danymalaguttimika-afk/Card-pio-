<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Malaguti Brothers</title>
  
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.6/babel.min.js"></script>
  
  <style>
    ::-webkit-scrollbar { display: none; }
    * { -ms-overflow-style: none; scrollbar-width: none; -webkit-tap-highlight-color: transparent; }
  </style>
</head>
<body class="bg-zinc-950 text-white selection:bg-amber-500 selection:text-white">
  
  <div id="root">
    <div style="color: #f59e0b; text-align: center; padding: 50px; font-family: sans-serif;">
      <h2 style="font-weight: bold; font-size: 24px; margin-bottom: 10px;">Carregando...</h2>
      <p style="color: #a1a1aa; font-size: 14px;">Conectando ao banco de dados seguro...</p>
    </div>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
    import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js";
    import { getFirestore, collection, onSnapshot, addDoc, deleteDoc, doc, updateDoc } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyAzCDS15N2e8hdP5wrQEzDNvZKBOAdeYjw",
      authDomain: "malaguti-brothers.firebaseapp.com",
      projectId: "malaguti-brothers",
      storageBucket: "malaguti-brothers.firebasestorage.app",
      messagingSenderId: "622848104847",
      appId: "1:622848104847:web:5874e22dab246855bb93fa"
    };

    const app = initializeApp(firebaseConfig);
    window.firebaseAPI = {
      auth: getAuth(app),
      db: getFirestore(app),
      collection, onSnapshot, addDoc, deleteDoc, doc, updateDoc, signInAnonymously, onAuthStateChanged
    };
    window.dispatchEvent(new Event('firebase-ready'));
  </script>

  <script type="text/babel">
    const { useState, useEffect } = React;
    const WHATSAPP_NUMBER = "5511999999999"; 
    const LOGO_URL = "https://cdn-icons-png.flaticon.com/512/3014/3014491.png"; 

    function App() {
      const [user, setUser] = useState(null);
      const [view, setView] = useState('menu');
      const [products, setProducts] = useState([]);
      const [orders, setOrders] = useState([]);
      const [loading, setLoading] = useState(true);

      const [cart, setCart] = useState([]);
      const [isCartOpen, setIsCartOpen] = useState(false);
      const [selectedProduct, setSelectedProduct] = useState(null);
      
      const [customerName, setCustomerName] = useState("");
      const [customerPhone, setCustomerPhone] = useState("");
      
      const [street, setStreet] = useState("");
      const [number, setNumber] = useState("");
      const [neighborhood, setNeighborhood] = useState("");
      const [reference, setReference] = useState("");
      
      const [activeCategory, setActiveCategory] = useState("Todos");
      const [pdvTab, setPdvTab] = useState('orders');
      const [orderFilter, setOrderFilter] = useState('pendente');
      const [isAddProductModalOpen, setIsAddProductModalOpen] = useState(false);
      const [newProduct, setNewProduct] = useState({ name: '', price: '', category: 'Burgers', description: '', imageUrl: '' });

      useEffect(() => {
        const init = () => {
          const { auth, signInAnonymously, onAuthStateChanged } = window.firebaseAPI;
          signInAnonymously(auth).catch(console.error);
          onAuthStateChanged(auth, setUser);
        };
        if (window.firebaseAPI) init();
        else window.addEventListener('firebase-ready', init);
      }, []);

      useEffect(() => {
        if (!user) return;
        const { db, collection, onSnapshot } = window.firebaseAPI;
        
        const unsubProducts = onSnapshot(collection(db, 'products'), (snap) => {
          setProducts(snap.docs.map(d => ({ id: d.id, ...d.data() })));
        });
        const unsubOrders = onSnapshot(collection(db, 'orders'), (snap) => {
          const ords = snap.docs.map(d => ({ id: d.id, ...d.data() }));
          ords.sort((a, b) => b.createdAt - a.createdAt);
          setOrders(ords);
          setLoading(false);
        });
        return () => { unsubProducts(); unsubOrders(); };
      }, [user]);

      const handlePdvAccess = () => {
        const senha = prompt("Digite a senha de acesso ao sistema:");
        if (senha === "1234") {
          setView('pdv');
        } else if (senha !== null) {
          alert("Senha incorreta! Acesso negado.");
        }
      };

      const addToCart = (product) => {
        setCart(prev => {
          const existing = prev.find(item => item.id === product.id);
          if (existing) return prev.map(item => item.id === product.id ? { ...item, quantity: item.quantity + 1 } : item);
          return [...prev, { ...product, quantity: 1 }];
        });
      };

      const updateQuantity = (productId, delta) => {
        setCart(prev => prev.map(item => {
          if (item.id === productId) {
            const newQ = item.quantity + delta;
            return newQ > 0 ? { ...item, quantity: newQ } : item;
          }
          return item;
        }));
      };

      const cartTotal = cart.reduce((acc, item) => acc + (parseFloat(item.price) * item.quantity), 0);

      const handleCheckout = async () => {
        if (cart.length === 0) return;
        if (!customerName.trim()) return alert("Por favor, insira seu nome.");
        if (!customerPhone.trim()) return alert("Por favor, insira seu WhatsApp.");
        if (!street.trim()) return alert("Por favor, insira o nome da rua.");
        if (!number.trim()) return alert("Por favor, insira o número.");
        if (!neighborhood.trim()) return alert("Por favor, insira o bairro.");

        let addressText = `${street}, ${number} - ${neighborhood}`;
        if (reference.trim()) {
          addressText += ` (Ref: ${reference})`;
        }

        let text = `*Novo Pedido - Malaguti Brothers*\n\n*Cliente:* ${customerName}\n*Telefone:* ${customerPhone}\n*Endereço:* ${addressText}\n\n*Itens:*\n`;
        cart.forEach(item => {
          text += `${item.quantity}x ${item.name} - R$ ${(parseFloat(item.price) * item.quantity).toFixed(2)}\n`;
        });
        text += `\n*Total:* R$ ${cartTotal.toFixed(2)}\n\n_Confirme a forma de pagamento._`;

        try {
          const { db, collection, addDoc } = window.firebaseAPI;
          await addDoc(collection(db, 'orders'), {
            customerName, customerPhone, customerAddress: addressText, phone: WHATSAPP_NUMBER, items: cart, total: cartTotal, status: 'pendente', source: 'whatsapp', createdAt: Date.now()
          });
          const waUrl = `https://wa.me/${WHATSAPP_NUMBER}?text=${encodeURIComponent(text)}`;
          window.open(waUrl, '_blank');
          
          setCart([]); setIsCartOpen(false); 
          setCustomerName(""); setCustomerPhone(""); 
          setStreet(""); setNumber(""); setNeighborhood(""); setReference("");
        } catch (error) { alert("Erro ao gerar pedido."); }
      };

      const handleAddProduct = async (e) => {
        e.preventDefault();
        if (!newProduct.name || !newProduct.price) return;
        try {
          const { db, collection, addDoc } = window.firebaseAPI;
          await addDoc(collection(db, 'products'), { ...newProduct, price: parseFloat(newProduct.price), createdAt: Date.now() });
          setNewProduct({ name: '', price: '', category: 'Burgers', description: '', imageUrl: '' });
          setIsAddProductModalOpen(false);
        } catch (error) { console.error(error); }
      };

      const handleDeleteProduct = async (id) => {
        if (!window.confirm("Tem certeza que deseja excluir este produto?")) return;
        const { db, doc, deleteDoc } = window.firebaseAPI;
        await deleteDoc(doc(db, 'products', id));
      };

      const handleDeleteOrder = async (id) => {
        if (!window.confirm("Atenção! Tem certeza que deseja apagar este pedido do sistema?")) return;
        const { db, doc, deleteDoc } = window.firebaseAPI;
        await deleteDoc(doc(db, 'orders', id));
      };

      const handleUpdateOrderStatus = async (orderId, newStatus) => {
        const { db, doc, updateDoc } = window.firebaseAPI;
        await updateDoc(doc(db, 'orders', orderId), { status: newStatus });
      };

      const handleFinishAndNotify = async (order) => {
        await handleUpdateOrderStatus(order.id, 'finalizado');
        
        if (order.customerPhone) {
          let foneLimpo = order.customerPhone.replace(/\D/g, ''); 
          if (!foneLimpo.startsWith('55') && foneLimpo.length <= 11) {
            foneLimpo = '55' + foneLimpo; 
          }
          
          const mensagem = `Olá ${order.customerName}, o seu pedido ficou pronto e nos próximos instantes sairá para entrega. Obrigado pelo seu pedido e que DEUS o abençoe. 🙏🍔`;
          const zapUrl = `https://wa.me/${foneLimpo}?text=${encodeURIComponent(mensagem)}`;
          window.open(zapUrl, '_blank');
        }
      };

      // Novo Sistema de Impressão Definitivo
      const printOrder = (order) => {
        let html = `
          <!DOCTYPE html>
          <html><head><title>Impressão</title>
          <style>
            body { font-family: monospace; padding: 0; margin: 0; font-size: 14px; color: black; background: white; }
            .container { padding: 10px; width: 80mm; margin: 0 auto; }
            h2 { font-size: 18px; margin: 0; text-align: center; }
            .text-center { text-align: center; }
            .border-b { border-bottom: 1px dashed black; margin-bottom: 10px; padding-bottom: 10px; }
            table { width: 100%; margin: 10px 0; border-collapse: collapse; }
            td { vertical-align: top; padding: 2px 0; }
            .text-right { text-align: right; }
          </style>
          </head><body>
            <div class="container">
              <div class="text-center border-b">
                <h2>MALAGUTI BROTHERS</h2>
                <p style="margin:5px 0 0 0;">Pedido #${order.id.substring(0, 5).toUpperCase()}</p>
                <p style="margin:2px 0 0 0;">${new Date(order.createdAt).toLocaleString('pt-BR')}</p>
              </div>
              <div class="border-b">
                <p style="margin:2px 0;"><strong>Cliente:</strong> ${order.customerName}</p>
                ${order.customerPhone ? `<p style="margin:2px 0;"><strong>Tel:</strong> ${order.customerPhone}</p>` : ''}
                ${order.customerAddress ? `<p style="margin:2px 0;"><strong>Endereço:</strong> ${order.customerAddress}</p>` : ''}
              </div>
              <table>
                ${order.items.map(item => `
                  <tr>
                    <td style="width: 15%;"><strong>${item.quantity}x</strong></td>
                    <td>${item.name}</td>
                    <td class="text-right">R$${(item.price * item.quantity).toFixed(2)}</td>
                  </tr>
                `).join('')}
              </table>
              <div class="text-right" style="margin-top: 10px; border-top: 1px dashed black; padding-top: 10px; font-size: 16px;">
                <strong>TOTAL: R$ ${order.total.toFixed(2)}</strong>
              </div>
            </div>
          </body></html>
        `;

        let iframe = document.getElementById('printFrame');
        if (!iframe) {
          iframe = document.createElement('iframe');
          iframe.id = 'printFrame';
          iframe.style.position = 'fixed';
          iframe.style.right = '0';
          iframe.style.bottom = '0';
          iframe.style.width = '0';
          iframe.style.height = '0';
          iframe.style.border = '0';
          document.body.appendChild(iframe);
        }
        
        iframe.contentWindow.document.open();
        iframe.contentWindow.document.write(html);
        iframe.contentWindow.document.close();

        // Dá meio segundo para a impressora ler o código escondido
        setTimeout(() => {
          iframe.contentWindow.focus();
          iframe.contentWindow.print();
        }, 500);
      };

      if (loading) return <div className="min-h-screen flex items-center justify-center font-bold text-amber-500 animate-pulse">Conectando ao banco de dados...</div>;

      const categories = ['Todos', 'Burgers', 'Porções', 'Bebidas', 'Sobremesas'];
      const filteredProducts = activeCategory === 'Todos' ? products : products.filter(p => p.category === activeCategory);

      return (
        <div className="min-h-screen relative pb-20 w-full overflow-x-hidden font-sans">
          
          <div className="fixed top-2 right-2 z-50 bg-zinc-800/80 p-1 rounded-full flex gap-1 border border-zinc-700 shadow-xl backdrop-blur-md">
            <button onClick={() => setView('menu')} className={`px-3 py-1.5 rounded-full text-[10px] font-bold uppercase transition-colors ${view === 'menu' ? 'bg-amber-500 text-black' : 'text-zinc-400'}`}>Cardápio</button>
            <button onClick={handlePdvAccess} className={`px-3 py-1.5 rounded-full text-[10px] font-bold uppercase transition-colors ${view === 'pdv' ? 'bg-amber-500 text-black' : 'text-zinc-400'}`}>PDV 🔒</button>
          </div>

          {view === 'menu' && (
            <div className="w-full max-w-md mx-auto relative bg-zinc-950 min-h-screen shadow-2xl">
              <header className="bg-zinc-900 rounded-b-[2.5rem] pt-12 pb-8 px-6 shadow-2xl relative z-10 flex flex-col items-center">
                <img src={LOGO_URL} alt="Logo" className="w-28 h-28 object-contain mb-4 drop-shadow-[0_0_15px_rgba(245,158,11,0.5)]" onError={(e) => e.target.style.display = 'none'} />
                <h1 className="text-3xl font-black text-white tracking-tight">MALAGUTI <span className="text-amber-500">BROTHERS</span></h1>
                <p className="text-zinc-400 text-sm mt-1">Lanchonete Artesanal</p>
              </header>

              <div className="sticky top-0 z-20 bg-zinc-950/90 backdrop-blur-md pt-4 pb-2 border-b border-zinc-800">
                <div className="flex overflow-x-auto gap-3 px-4 pb-2 snap-x">
                  {categories.map(cat => (
                    <button key={cat} onClick={() => setActiveCategory(cat)} className={`snap-center whitespace-nowrap px-5 py-2.5 rounded-full text-sm font-bold ${activeCategory === cat ? 'bg-amber-500 text-zinc-950' : 'bg-zinc-900 text-zinc-400 border border-zinc-800'}`}>
                      {cat}
                    </button>
                  ))}
                </div>
              </div>

              <main className="p-4 space-y-4 pb-32">
                {filteredProducts.map(product => (
                  <div key={product.id} onClick={() => setSelectedProduct(product)} className="bg-zinc-900 rounded-3xl p-3 flex gap-4 border border-zinc-800 cursor-pointer active:scale-[0.98] transition-transform">
                    <div className="w-28 h-28 shrink-0 rounded-2xl bg-zinc-950 flex items-center justify-center overflow-hidden">
                      {product.imageUrl ? <img src={product.imageUrl} className="w-full h-full object-cover" /> : <span className="text-3xl">🍔</span>}
                    </div>
                    <div className="flex-1 flex flex-col justify-between py-1 pr-1">
                      <div>
                        <h3 className="font-bold text-zinc-100">{product.name}</h3>
                        <p className="text-[11px] text-zinc-400 mt-1 line-clamp-2">{product.description}</p>
                      </div>
                      <div className="flex items-center justify-between mt-2">
                        <span className="font-black text-amber-500 text-lg">R$ {parseFloat(product.price).toFixed(2)}</span>
                        <button onClick={(e) => { e.stopPropagation(); addToCart(product); }} className="w-10 h-10 bg-amber-500 rounded-full flex items-center justify-center text-zinc-950 font-black text-xl">➕</button>
                      </div>
                    </div>
                  </div>
                ))}
                {filteredProducts.length === 0 && (
                  <div className="text-center text-zinc-500 mt-10">Nenhum produto cadastrado nesta categoria.</div>
                )}
              </main>

              {selectedProduct && (
                <div className="fixed inset-0 z-50 flex items-end justify-center">
                  <div className="absolute inset-0 bg-black/80 backdrop-blur-sm" onClick={() => setSelectedProduct(null)}></div>
                  <div className="bg-zinc-900 w-full max-w-md rounded-t-[2.5rem] relative z-10 flex flex-col max-h-[85vh]">
                    <div className="relative h-56 bg-zinc-950 rounded-t-[2.5rem] overflow-hidden shrink-0">
                       {selectedProduct.imageUrl ? <img src={selectedProduct.imageUrl} className="w-full h-full object-cover" /> : <div className="w-full h-full flex items-center justify-center text-6xl">🍔</div>}
                       <button onClick={() => setSelectedProduct(null)} className="absolute top-4 right-4 bg-black/50 text-white w-10 h-10 rounded-full flex items-center justify-center text-xl backdrop-blur-md">✖️</button>
                    </div>
                    <div className="p-6 overflow-y-auto">
                      <h2 className="text-2xl font-black text-white mb-1">{selectedProduct.name}</h2>
                      <p className="text-amber-500 font-black text-2xl mb-6">R$ {parseFloat(selectedProduct.price).toFixed(2)}</p>
                      
                      <div className="bg-zinc-950 p-4 rounded-2xl border border-zinc-800">
                        <h3 className="font-bold text-zinc-300 mb-2 uppercase text-xs tracking-wider">O que vem no pedido:</h3>
                        <p className="text-zinc-400 text-sm leading-relaxed whitespace-pre-wrap">{selectedProduct.description || "Nenhuma descrição detalhada disponível para este produto."}</p>
                      </div>
                    </div>
                    <div className="p-6 bg-zinc-950 border-t border-zinc-800">
                      <button onClick={() => { addToCart(selectedProduct); setSelectedProduct(null); }} className="w-full bg-amber-500 text-black py-4 rounded-2xl font-black text-lg shadow-[0_5px_20px_rgba(245,158,11,0.3)]">
                        Adicionar à Sacola
                      </button>
                    </div>
                  </div>
                </div>
              )}

              {cart.length > 0 && (
                <div className="fixed bottom-6 left-1/2 -translate-x-1/2 w-full max-w-[90%] z-40">
                  <button onClick={() => setIsCartOpen(true)} className="w-full bg-amber-500 text-zinc-950 px-6 py-4 rounded-3xl font-bold flex items-center justify-between shadow-[0_10px_40px_rgba(245,158,11,0.3)]">
                    <div className="flex items-center gap-3">
                      <div className="bg-zinc-950 text-amber-500 w-8 h-8 rounded-full flex items-center justify-center font-black">{cart.reduce((a, b) => a + b.quantity, 0)}</div>
                      <span>Ver Sacola</span>
                    </div>
                    <span className="text-lg">R$ {cartTotal.toFixed(2)}</span>
                  </button>
                </div>
              )}

              {isCartOpen && (
                <div className="fixed inset-0 z-50 flex items-end justify-center">
                  <div className="absolute inset-0 bg-black/60 backdrop-blur-sm" onClick={() => setIsCartOpen(false)}></div>
                  <div className="bg-zinc-900 w-full max-w-md h-[90vh] rounded-t-[2.5rem] relative z-10 flex flex-col">
                    <div className="px-6 pb-4 pt-6 flex justify-between items-center border-b border-zinc-800">
                      <h2 className="text-2xl font-black text-white flex items-center gap-2">🛍️ Sacola</h2>
                      <button onClick={() => setIsCartOpen(false)} className="bg-zinc-800 p-2 rounded-full">✖️</button>
                    </div>
                    <div className="flex-1 overflow-y-auto p-6 space-y-6">
                      {cart.map(item => (
                        <div key={item.id} className="flex items-center gap-4">
                          <div className="flex-1">
                            <h4 className="font-bold text-zinc-100">{item.name}</h4>
                            <p className="text-amber-500 font-bold mt-1">R$ {(item.price * item.quantity).toFixed(2)}</p>
                          </div>
                          <div className="flex items-center bg-zinc-950 rounded-full border border-zinc-800">
                            <button onClick={() => updateQuantity(item.id, -1)} className="w-10 h-10 flex items-center justify-center">➖</button>
                            <span className="font-black w-4 text-center text-zinc-100">{item.quantity}</span>
                            <button onClick={() => updateQuantity(item.id, 1)} className="w-10 h-10 flex items-center justify-center text-amber-500">➕</button>
                          </div>
                        </div>
                      ))}
                    </div>
                    
                    <div className="p-6 bg-zinc-950 border-t border-zinc-800 rounded-t-3xl">
                      <input type="text" value={customerName} onChange={(e) => setCustomerName(e.target.value)} placeholder="Seu nome" className="w-full bg-zinc-900 border border-zinc-700 rounded-2xl px-5 py-3 text-white mb-3" />
                      <input type="tel" value={customerPhone} onChange={(e) => setCustomerPhone(e.target.value)} placeholder="WhatsApp (Ex: 11999999999)" className="w-full bg-zinc-900 border border-zinc-700 rounded-2xl px-5 py-3 text-white mb-3" />
                      
                      <div className="flex gap-2 mb-3">
                        <input type="text" value={street} onChange={(e) => setStreet(e.target.value)} placeholder="Rua" className="flex-1 bg-zinc-900 border border-zinc-700 rounded-2xl px-5 py-3 text-white" />
                        <input type="text" value={number} onChange={(e) => setNumber(e.target.value)} placeholder="Nº" className="w-24 bg-zinc-900 border border-zinc-700 rounded-2xl px-4 py-3 text-white text-center" />
                      </div>
                      
                      <input type="text" value={neighborhood} onChange={(e) => setNeighborhood(e.target.value)} placeholder="Bairro" className="w-full bg-zinc-900 border border-zinc-700 rounded-2xl px-5 py-3 text-white mb-3" />
                      <input type="text" value={reference} onChange={(e) => setReference(e.target.value)} placeholder="Referência (Opcional)" className="w-full bg-zinc-900 border border-zinc-700 rounded-2xl px-5 py-3 text-white mb-4" />
                      
                      <button onClick={handleCheckout} className="w-full bg-[#25D366] text-white py-4 rounded-2xl font-black text-lg flex items-center justify-center gap-3">
                        💬 Enviar Pedido
                      </button>
                    </div>
                  </div>
                </div>
              )}
            </div>
          )}

          {view === 'pdv' && (
            <div className="bg-zinc-100 min-h-screen text-zinc-900 flex flex-col w-full max-w-md mx-auto shadow-2xl relative">
              <header className="bg-zinc-900 pt-10 pb-6 px-6 rounded-b-[2rem] shadow-lg sticky top-0 z-20 flex justify-between items-center text-white">
                <div>
                  <h1 className="text-xl font-black uppercase leading-none">PDV Mobile</h1>
                  <span className="text-[10px] text-amber-500 font-bold uppercase">Malaguti Brothers</span>
                </div>
              </header>

              <main className="flex-1 overflow-y-auto pb-24">
                {pdvTab === 'orders' && (
                  <div className="p-4">
                    <div className="flex bg-zinc-200 p-1 rounded-2xl mb-6">
                      {['pendente', 'preparando', 'finalizado'].map(tab => (
                        <button key={tab} onClick={() => setOrderFilter(tab)} className={`flex-1 py-2.5 rounded-xl text-sm font-bold ${orderFilter === tab ? 'bg-amber-500 text-black' : 'text-zinc-500'}`}>
                          {tab === 'pendente' ? 'Novos' : tab === 'preparando' ? 'Cozinha' : 'Prontos'}
                        </button>
                      ))}
                    </div>
                    <div className="space-y-4">
                      {orders.filter(o => o.status === orderFilter).map(order => (
                        <div key={order.id} className="bg-white rounded-3xl p-5 shadow-sm border border-zinc-200">
                          <h3 className="font-black text-lg">{order.customerName}</h3>
                          {order.customerPhone && <p className="text-xs text-zinc-500 mt-1">📱 {order.customerPhone}</p>}
                          {order.customerAddress && <p className="text-xs text-zinc-500 mt-1 leading-tight">📍 {order.customerAddress}</p>}
                          
                          <div className="bg-zinc-50 rounded-2xl p-4 my-4">
                            {order.items.map((item, idx) => (
                              <div key={idx} className="text-sm py-1"><span className="font-black mr-1">{item.quantity}x</span> {item.name}</div>
                            ))}
                          </div>
                          <div className="flex gap-2">
                            <button onClick={() => printOrder(order)} className="w-12 h-12 bg-zinc-100 rounded-2xl flex items-center justify-center text-xl">🖨️</button>
                            <button onClick={() => handleDeleteOrder(order.id)} className="w-12 h-12 bg-red-100 text-red-500 rounded-2xl flex items-center justify-center text-xl">🗑️</button>
                            
                            {order.status === 'pendente' && <button onClick={() => handleUpdateOrderStatus(order.id, 'preparando')} className="flex-1 bg-amber-500 font-black rounded-2xl">Preparar</button>}
                            
                            {order.status === 'preparando' && <button onClick={() => handleFinishAndNotify(order)} className="flex-1 bg-[#25D366] text-white font-black rounded-2xl text-sm leading-tight">Finalizar & Avisar</button>}
                          </div>
                        </div>
                      ))}
                      {orders.filter(o => o.status === orderFilter).length === 0 && (
                        <div className="text-center text-zinc-400 mt-10">Nenhum pedido nesta aba.</div>
                      )}
                    </div>
                  </div>
                )}

                {pdvTab === 'products' && (
                  <div className="p-4">
                    {products.map(product => (
                      <div key={product.id} className="bg-white p-3 rounded-2xl flex gap-4 mb-3 border border-zinc-200 items-center">
                        <div className="flex-1">
                          <h4 className="font-bold text-sm">{product.name}</h4>
                          <p className="text-sm font-black mt-1">R$ {parseFloat(product.price).toFixed(2)}</p>
                        </div>
                        <button onClick={() => handleDeleteProduct(product.id)} className="p-3 bg-red-50 text-red-500 rounded-xl">🗑️</button>
                      </div>
                    ))}
                    <button onClick={() => setIsAddProductModalOpen(true)} className="fixed bottom-24 right-6 w-14 h-14 bg-zinc-900 text-white rounded-full text-2xl flex items-center justify-center shadow-lg">➕</button>
                  </div>
                )}
              </main>

              {isAddProductModalOpen && (
                <div className="fixed inset-0 z-50 flex items-end justify-center bg-black/60">
                  <div className="bg-white w-full max-w-md rounded-t-[2rem] p-6 relative z-10 h-[85vh] flex flex-col">
                    <div className="flex justify-between items-center mb-6">
                      <h3 className="font-black text-2xl">Novo Produto</h3>
                      <button onClick={() => setIsAddProductModalOpen(false)}>✖️</button>
                    </div>
                    <form className="flex-1 overflow-y-auto space-y-4">
                      <input required type="text" value={newProduct.name} onChange={e => setNewProduct({...newProduct, name: e.target.value})} className="w-full bg-zinc-50 border border-zinc-200 rounded-2xl p-4" placeholder="Nome" />
                      <input required type="number" value={newProduct.price} onChange={e => setNewProduct({...newProduct, price: e.target.value})} className="w-full bg-zinc-50 border border-zinc-200 rounded-2xl p-4" placeholder="Preço" />
                      <select value={newProduct.category} onChange={e => setNewProduct({...newProduct, category: e.target.value})} className="w-full bg-zinc-50 border border-zinc-200 rounded-2xl p-4"><option>Burgers</option><option>Porções</option><option>Bebidas</option><option>Sobremesas</option></select>
                      <input type="url" value={newProduct.imageUrl} onChange={e => setNewProduct({...newProduct, imageUrl: e.target.value})} className="w-full bg-zinc-50 border border-zinc-200 rounded-2xl p-4" placeholder="URL da Imagem (Opcional)" />
                      <textarea value={newProduct.description} onChange={e => setNewProduct({...newProduct, description: e.target.value})} className="w-full bg-zinc-50 border border-zinc-200 rounded-2xl p-4 h-24" placeholder="Descrição"></textarea>
                    </form>
                    <button onClick={handleAddProduct} className="w-full bg-zinc-900 text-white font-black py-4 rounded-2xl mt-4">Salvar</button>
                  </div>
                </div>
              )}

              <nav className="fixed bottom-0 w-full max-w-md bg-white border-t border-zinc-200 z-30">
                <div className="flex justify-around p-3">
                  <button onClick={() => setPdvTab('orders')} className={`font-bold p-2 ${pdvTab === 'orders' ? 'text-amber-500' : 'text-zinc-400'}`}>Pedidos</button>
                  <button onClick={() => setPdvTab('products')} className={`font-bold p-2 ${pdvTab === 'products' ? 'text-amber-500' : 'text-zinc-400'}`}>Cardápio</button>
                </div>
              </nav>
            </div>
          )}
        </div>
      );
    }
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
